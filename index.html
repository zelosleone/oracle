<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #2c3e50;
            --accent-color: #e74c3c;
            --background-color: #ecf0f1;
            --card-background: #ffffff;
            --text-color: #2c3e50;
            --border-radius: 12px;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--background-color);
            background-image: linear-gradient(45deg, #f3f4f6 25%, transparent 25%),
                            linear-gradient(-45deg, #f3f4f6 25%, transparent 25%),
                            linear-gradient(45deg, transparent 75%, #f3f4f6 75%),
                            linear-gradient(-45deg, transparent 75%, #f3f4f6 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            touch-action: none;
        }

        #oracle-container {
            text-align: center;
            padding: 2rem;
            background-color: var(--card-background);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            max-width: 800px;
            width: 90%;
            margin: 2rem;
        }

        h1 {
            color: var(--secondary-color);
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #ancient-message, #hebrew-message {
            font-family: 'Times New Roman', serif;
            color: var(--text-color);
            line-height: 1.6;
            margin: 1rem 0;
            padding: 1rem;
            background-color: rgba(0, 0, 0, 0.05);
            border-radius: var(--border-radius);
        }

        #answers-input {
            width: 90%;
            padding: 1rem;
            margin: 1rem 0;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: var(--border-radius);
            resize: vertical;
            min-height: 100px;
            transition: border-color 0.3s ease;
        }

        #answers-input:focus {
            border-color: var(--primary-color);
            outline: none;
            box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.2);
        }

        #canvas-container {
            position: relative;
            margin: 1rem auto;
            max-width: 100%;
            touch-action: none;
        }

        #canvas {
            border: 2px solid #ddd;
            border-radius: var(--border-radius);
            cursor: crosshair;
            touch-action: none;
            background-color: white;
            max-width: 100%;
            height: auto;
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        input[type="color"] {
            width: 50px;
            height: 50px;
            padding: 0;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }

        input[type="range"] {
            width: 200px;
            height: 7px;
            -webkit-appearance: none;
            background: #ddd;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: var(--primary-color);
            border-radius: 50%;
            cursor: pointer;
        }

        button {
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            transition: transform 0.2s ease, background-color 0.2s ease;
            margin: 0.5rem;
        }

        button:hover {
            background-color: #357abd;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #process-log {
            text-align: left;
            margin-top: 1.5rem;
            padding: 1.5rem;
            background-color: #f8f9fa;
            border-radius: var(--border-radius);
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            border: 1px solid #dee2e6;
        }

        #result {
            font-size: 1.5rem;
            margin: 1.5rem 0;
            padding: 1rem;
            background-color: #e3f2fd;
            border-radius: var(--border-radius);
            color: var(--secondary-color);
            font-weight: bold;
        }

        #loading {
            color: var(--primary-color);
            font-style: italic;
        }

        #error-message {
            color: var(--accent-color);
            padding: 1rem;
            border-radius: var(--border-radius);
            background-color: rgba(231, 76, 60, 0.1);
        }

        @media (max-width: 600px) {
            #oracle-container {
                padding: 1rem;
                margin: 1rem;
            }

            h1 {
                font-size: 1.8rem;
            }

            #canvas {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
    <div id="oracle-container">
        <h1>Revealer of Truth</h1>
        <p id="ancient-message">αιη αιωι ηωιαη αη ιω ωη αιηουευωαι εαι υο ιαω ιωη οαυ αεη υωυω χαβραχ φλιεσ κηρφι νυρω φωχω βωχ :7</p>
        <p id="hebrew-message">הכפף לי כל הדיימונים, למען ישמעו לי כל דיימון, בין בשמים או ברוח או בארץ או מתחת לארץ או ביבשה או במים, וכל קסם ונגע אשר מאת האלוהים.</p>
        <textarea id="answers-input" rows="5" placeholder="Enter possible answers, one per line"></textarea>
        <div id="canvas-container">
            <canvas id="canvas" width="400" height="400"></canvas>
        </div>
        <div class="controls">
            <input type="color" id="color-picker" value="#000000" title="Choose color">
            <input type="range" id="brush-size" min="1" max="50" value="5" title="Adjust brush size">
        </div>
        <div>
            <button onclick="clearCanvas()">Clear Canvas</button>
            <button onclick="askOracleMultipleTimes()">Show The Truth!</button>
        </div>
        <p id="loading" style="display: none;">Consulting the oracle...</p>
        <p id="error-message" style="display: none;"></p>
        <p id="user-question"></p>
        <p id="result"></p>
        <div id="process-log"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('color-picker');
        const brushSize = document.getElementById('brush-size');
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        // Get mouse position relative to canvas
        function getPosition(event) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            if (event.type.includes('touch')) {
                return {
                    x: (event.touches[0].clientX - rect.left) * scaleX,
                    y: (event.touches[0].clientY - rect.top) * scaleY
                };
            }
            return {
                x: (event.clientX - rect.left) * scaleX,
                y: (event.clientY - rect.top) * scaleY
            };
        }

        // Start drawing
        function startDrawing(e) {
            isDrawing = true;
            const pos = getPosition(e);
            [lastX, lastY] = [pos.x, pos.y];
        }

        // Draw
        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getPosition(e);
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = colorPicker.value;
            ctx.lineWidth = brushSize.value;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            [lastX, lastY] = [pos.x, pos.y];
        }

        // Stop drawing
        function stopDrawing() {
            isDrawing = false;
        }

        // Mouse event listeners
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);

        // Touch event listeners
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startDrawing(e);
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            draw(e);
        });
        canvas.addEventListener('touchend', stopDrawing);
        canvas.addEventListener('touchcancel', stopDrawing);

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        async function getRandomNumbers(min, max, count) {
            const apiKey = 'b7e2d30e-28a0-4c92-b839-e278a26f1eb6';
            try {
                const response = await fetch(
                    `https://www.random.org/integers/?num=${count}&min=${min}&max=${max}&col=1&base=10&format=plain&rnd=new&apiKey=${apiKey}`
                );

                if (!response.ok) {
                    throw new Error('Failed to get random numbers from Random.org');
                }

                const numbers = await response.text();
                return numbers.trim().split('\n').map(n => parseInt(n, 10));
            } catch (error) {
                console.error('Random.org Error:', error);
                throw new Error('Unable to access true randomness. Please try again.');
            }
        }

        function processMagicPhrase(phrase) {
            return phrase.split('').reverse().join('');
        }

        function isPrime(num) {
            for(let i = 2, s = Math.sqrt(num); i <= s; i++)
                if(num % i === 0) return false; 
            return num > 1;
        }

        function getNextPrime(num) {
            while(!isPrime(++num)) {};
            return num;
        }

        async function askOracleMultipleTimes() {
            const answersInput = document.getElementById('answers-input').value.trim();
            const processLog = document.getElementById('process-log');
            
            if (answersInput === '' || canvas.toDataURL() === document.createElement('canvas').toDataURL()) {
                alert('Please enter both answers and paint your question.');
                return;
            }

            const answers = answersInput.split('\n').filter(line => line.trim() !== '');
            if (answers.length < 2) {
                alert('Please enter at least two possible answers.');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').textContent = '';
            document.getElementById('user-question').textContent = '';
            document.getElementById('error-message').style.display = 'none';
            processLog.innerHTML = '<h3>Oracle Consultation Log</h3>';

            const answerCounts = {};
            const baseRuns = answers.length > 2 ? getNextPrime(9 * answers.length) : 9;
            const totalRuns = baseRuns;

            try {
                const randomNumbers = await getRandomNumbers(0, answers.length - 1, totalRuns);
                
                for (let i = 0; i < totalRuns; i++) {
                    const answer = answers[randomNumbers[i]];
                    answerCounts[answer] = (answerCounts[answer] || 0) + 1;
                    
                    if (i < 9) {
                        processLog.innerHTML += `<p>Run ${i + 1}: ${answer}</p>`;
                    } else if (i === 9) {
                        processLog.innerHTML += "<p>...</p>";
                    }
                }

                const mostFrequentAnswer = Object.entries(answerCounts).reduce((a, b) => a[1] > b[1] ? a : b)[0];
                const frequency = answerCounts[mostFrequentAnswer];
                const percentage = ((frequency / totalRuns) * 100).toFixed(2);

                document.getElementById('user-question').textContent = `Your painted question has been received.`;
                document.getElementById('result').textContent = `Oracle says (${percentage}% certainty): ${mostFrequentAnswer}`;
                
                processLog.innerHTML += `
                    <div class="summary">
                        <p>Total consultations: ${totalRuns}</p>
                        <p>Results summary:</p>
                    </div>
                `;
                for (const [answer, count] of Object.entries(answerCounts)) {
                    const answerPercentage = ((count / totalRuns) * 100).toFixed(2);
                    processLog.innerHTML += `<p>${answer}: ${answerPercentage}%</p>`;
                }
            } catch (error) {
                console.error('Error in askOracleMultipleTimes:', error
