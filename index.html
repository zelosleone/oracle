<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        #oracle-container {
            text-align: center;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        #question-input, #answers-input {
            width: 80%;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 16px;
        }
        #result {
            font-size: 18px;
            margin: 20px 0;
            font-weight: bold;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        #user-question {
            font-weight: bold;
            margin-top: 20px;
        }
        #loading, #error-message {
            display: none;
            margin-top: 10px;
        }
        #error-message {
            color: red;
        }
    </style>
</head>
<body>
    <div id="oracle-container">
        <h1>Revealer of Truth</h1>
        <p>αιη αιωι ηωιαη αη ιω ωη αιηουευωαι εαι υο ιαω ιωη οαυ αεη υωυω χαβραχ φλιεσ κηρφι νυρω φωχω βωχ :7</p>
        <textarea id="answers-input" rows="5" placeholder="Enter possible answers, one per line"></textarea>
        <input type="text" id="question-input" placeholder="What's your question?">
        <button onclick="askOracle()">Show The Truth!</button>
        <p id="loading">Consulting the oracle...</p>
        <p id="error-message"></p>
        <p id="user-question"></p>
        <p id="result"></p>
    </div>

    <script>
        async function getRandomNumber(min, max) {
            const apiKey = 'b7e2d30e-28a0-4c92-b839-e278a26f1eb6';
            try {
                const response = await fetch(`https://www.random.org/integers/?num=1&min=${min}&max=${max}&col=1&base=10&format=plain&rnd=new&apiKey=${apiKey}`);

                if (!response.ok) {
                    throw new Error('Failed to get random number');
                }

                const number = await response.text();
                return parseInt(number.trim(), 10);
            } catch (error) {
                throw new Error('Error connecting to Random.org. Please try again.');
            }
        }

        async function askOracle() {
            const answersInput = document.getElementById('answers-input').value.trim();
            const questionInput = document.getElementById('question-input');
            const userQuestion = questionInput.value.trim();
            
            if (answersInput === '' || userQuestion === '') {
                alert('Please enter both answers and a question.');
                return;
            }

            const answers = answersInput.split('\n').filter(line => line.trim() !== '');
            if (answers.length < 2) {
                alert('Please enter at least two possible answers.');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').textContent = '';
            document.getElementById('user-question').textContent = '';
            document.getElementById('error-message').style.display = 'none';

            try {
                const randomIndex = await getRandomNumber(0, answers.length - 1);
                const selectedAnswer = answers[randomIndex];

                document.getElementById('user-question').textContent = `Your question: ${userQuestion}`;
                document.getElementById('result').textContent = `Oracle says: ${selectedAnswer}`;
            } catch (error) {
                console.error('Error in askOracle:', error);
                document.getElementById('error-message').textContent = error.message;
                document.getElementById('error-message').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
            
            questionInput.value = '';
        }
    </script>
</body>
</html>
