<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #2c3e50;
            --accent-color: #e74c3c;
            --background-color: #ecf0f1;
            --card-background: #ffffff;
            --text-color: #2c3e50;
            --border-radius: 12px;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
            padding: 20px;
        }

        #oracle-container {
            text-align: center;
            padding: 2rem;
            background: var(--card-background);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            max-width: 800px;
            width: 100%;
            margin: 20px;
        }

        h1 {
            color: var(--primary-color);
            margin-bottom: 1.5rem;
            font-size: 2.5rem;
            font-weight: 700;
        }

        #ancient-message, #hebrew-message {
            background: rgba(74, 144, 226, 0.1);
            padding: 1rem;
            border-radius: var(--border-radius);
            margin: 1rem 0;
            font-style: italic;
            line-height: 1.8;
        }

        #answers-input {
            width: 100%;
            padding: 1rem;
            margin: 1rem 0;
            font-size: 1rem;
            border: 2px solid #ddd;
            border-radius: var(--border-radius);
            resize: vertical;
            transition: border-color 0.3s ease;
        }

        #answers-input:focus {
            border-color: var(--primary-color);
            outline: none;
        }

        #canvas-container {
            position: relative;
            margin: 2rem auto;
            max-width: 100%;
            touch-action: none;
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        #canvas {
            display: block;
            background: white;
            cursor: crosshair;
            touch-action: none;
            max-width: 100%;
            height: auto;
            border-radius: var(--border-radius);
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
            justify-content: center;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        #color-picker {
            width: 50px;
            height: 40px;
            padding: 0;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        #brush-size {
            width: 150px;
        }

        button {
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            transition: transform 0.2s ease, background-color 0.2s ease;
            font-weight: 600;
        }

        button:hover {
            background: #357abd;
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        #loading {
            color: var(--primary-color);
            font-weight: 600;
        }

        #error-message {
            color: var(--accent-color);
            padding: 1rem;
            border-radius: var(--border-radius);
            background: rgba(231, 76, 60, 0.1);
        }

        #result {
            font-size: 1.5rem;
            margin: 2rem 0;
            padding: 1rem;
            background: rgba(74, 144, 226, 0.1);
            border-radius: var(--border-radius);
            color: var(--primary-color);
            font-weight: 700;
        }

        #process-log {
            text-align: left;
            margin-top: 2rem;
            padding: 1.5rem;
            background: rgba(44, 62, 80, 0.05);
            border-radius: var(--border-radius);
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            border: 1px solid rgba(44, 62, 80, 0.1);
        }

        #process-log h3 {
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        #process-log p {
            margin: 0.5rem 0;
        }

        #process-log .summary {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(44, 62, 80, 0.1);
            font-weight: 600;
        }

        @media (max-width: 768px) {
            #oracle-container {
                padding: 1rem;
                margin: 10px;
            }

            h1 {
                font-size: 2rem;
            }

            .controls {
                flex-direction: column;
                align-items: stretch;
            }

            #result {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div id="oracle-container">
        <h1>Revealer of Truth</h1>
        <p id="ancient-message">αιη αιωι ηωιαη αη ιω ωη αιηουευωαι εαι υο ιαω ιωη οαυ αεη υωυω χαβραχ φλιεσ κηρφι νυρω φωχω βωχ :7</p>
        <p id="hebrew-message">הכפף לי כל הדיימונים, למען ישמעו לי כל דיימון, בין בשמים או ברוח או בארץ או מתחת לארץ או ביבשה או במים, וכל קסם ונגע אשר מאת האלוהים.</p>
        
        <textarea id="answers-input" rows="5" placeholder="Enter possible answers, one per line"></textarea>
        
        <div id="canvas-container">
            <canvas id="canvas" width="400" height="400"></canvas>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <input type="color" id="color-picker" value="#000000">
                <input type="range" id="brush-size" min="1" max="50" value="5">
            </div>
            <button onclick="clearCanvas()">Clear Canvas</button>
            <button onclick="askOracleMultipleTimes()">Show The Truth!</button>
        </div>
        
        <p id="loading" style="display: none;">Consulting the oracle...</p>
        <p id="error-message" style="display: none;"></p>
        <p id="user-question"></p>
        <p id="result"></p>
        <div id="process-log"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('color-picker');
        const brushSize = document.getElementById('brush-size');
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        // Handle both mouse and touch events
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);
        canvas.addEventListener('mouseenter', checkDrawing);

        // Touch events
        canvas.addEventListener('touchstart', handleTouchStart);
        canvas.addEventListener('touchmove', handleTouchMove);
        canvas.addEventListener('touchend', stopDrawing);

        function getPosition(event) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            if (event.type.includes('touch')) {
                return {
                    x: (event.touches[0].clientX - rect.left) * scaleX,
                    y: (event.touches[0].clientY - rect.top) * scaleY
                };
            }
            return {
                x: (event.clientX - rect.left) * scaleX,
                y: (event.clientY - rect.top) * scaleY
            };
        }

        function startDrawing(e) {
            if (e.type === 'mousedown' && e.button !== 0) return; // Only start on left mouse button
            isDrawing = true;
            const pos = getPosition(e);
            [lastX, lastY] = [pos.x, pos.y];
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getPosition(e);
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = colorPicker.value;
            ctx.lineWidth = brushSize.value;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            [lastX, lastY] = [pos.x, pos.y];
        }

        function stopDrawing() {
            isDrawing = false;
        }

        function checkDrawing(e) {
            if (e.buttons !== 1) { // If left mouse button is not pressed
                isDrawing = false;
            } else {
                const pos = getPosition(e);
                [lastX, lastY] = [pos.x, pos.y];
            }
        }

        function handleTouchStart(e) {
            e.preventDefault();
            startDrawing(e);
        }

        function handleTouchMove(e) {
            e.preventDefault();
            draw(e);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        async function getRandomNumber(min, max) {
            const apiKey = 'b7e2d30e-28a0-4c92-b839-e278a26f1eb6';
            try {
                const response = await fetch(
                    `https://www.random.org/integers/?num=1&min=${min}&max=${max}&col=1&base=10&format=plain&rnd=new&apiKey=${apiKey}`
                );

                if (!response.ok) {
                    throw new Error('Failed to get random number from Random.org');
                }

                const number = await response.text();
                return parseInt(number.trim(), 10);
            } catch (error) {
                throw new Error('Error connecting to Random.org. Please try again.');
            }
        }

        async function processMagicPhrase(phrase) {
            // Get a true random number for the number of reversals
            const reversals = await getRandomNumber(1, 9);
            let processedPhrase = phrase;
            for (let i = 0; i < reversals; i++) {
                processedPhrase = processedPhrase.split('').reverse().join('');
            }
            return processedPhrase;
        }

        async function isPrime(num) {
            // Use Random.org to help determine primality
            const checks = Math.min(num - 2, 10); // Number of random checks
            for (let i = 0; i < checks; i++) {
                const testNum = await getRandomNumber(2, num - 1);
                if (num % testNum === 0) return false;
            }
            return num > 1;
        }

        async function getNextPrime(num) {
            while (!(await isPrime(num))) {
                num++;
            }
            return num;
        }

        async function askOracle(answers) {
            const ancientMessage = document.getElementById('ancient-message').textContent;
            const hebrewMessage = document.getElementById('hebrew-message').textContent;
            const combinedMessage = ancientMessage + ' ' + hebrewMessage;
            
            // Process the magic phrase with true randomness
            const processedMessage = await processMagicPhrase(combinedMessage);
            
            // Get a true random index from Random.org
            const randomIndex = await getRandomNumber(0, answers.length - 1);
            return answers[randomIndex];
        }

            const answersInput = document.getElementById('answers-input').value.trim();
            const processLog = document.getElementById('process-log');
            
            if (answersInput === '' || canvas.toDataURL() === document.createElement('canvas').toDataURL()) {
                alert('Please enter both answers and paint your question.');
                return;
            }

            const answers = answersInput.split('\n').filter(line => line.trim() !== '');
            if (answers.length < 2) {
                alert('Please enter at least two possible answers.');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').textContent = '';
            document.getElementById('user-question').textContent = '';
            document.getElementById('error-message').style.display = 'none';
            processLog.innerHTML = '<h3>Oracle Consultation Log</h3>';

            const answerCounts = {};
            let baseRuns = 9;

            try {
                // Use true randomness to determine the number of runs
                if (answers.length > 2) {
                    baseRuns = await getNextPrime(9 * answers.length);
                }

                const totalRuns = baseRuns;

                for (let i = 0; i < totalRuns; i++) {
                    const answer = await askOracle(answers);
                    answerCounts[answer] = (answerCounts[answer] || 0) + 1;
