<!DOCTYPE html>
<html lang="en">
<head>

<body>
<img id="talisman-image" src="talisman.png" alt="Talisman">
    <div id="oracle-container">
        <!-- (Container content remains the same) -->
    </div>

    <script>
        async function getRandomNumber(min, max) {
            // (This function remains the same)
        }

        function processMagicPhrase(phrase) {
            return phrase.split('').reverse().join('');
        }

        async function askOracle(answers, repetitions) {
            const ancientMessage = document.getElementById('ancient-message').textContent;
            const hebrewMessage = document.getElementById('hebrew-message').textContent;
            const combinedMessage = ancientMessage + ' ' + hebrewMessage;
            
            // Process the combined message 'repetitions' times
            let processedMessage = combinedMessage;
            for (let i = 0; i < repetitions; i++) {
                processedMessage = processMagicPhrase(processedMessage);
            }
            console.log(`Processed Magic Phrase ${repetitions} times:`, processedMessage);

            const randomIndex = await getRandomNumber(0, answers.length - 1);
            return answers[randomIndex];
        }

        async function askOracleMultipleTimes() {
            const answersInput = document.getElementById('answers-input').value.trim();
            const questionInput = document.getElementById('question-input');
            const userQuestion = questionInput.value.trim();
            const processLog = document.getElementById('process-log');
            
            if (answersInput === '' || userQuestion === '') {
                alert('Please enter both answers and a question.');
                return;
            }

            const answers = answersInput.split('\n').filter(line => line.trim() !== '');
            if (answers.length < 2) {
                alert('Please enter at least two possible answers.');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').textContent = '';
            document.getElementById('user-question').textContent = '';
            document.getElementById('error-message').style.display = 'none';
            processLog.textContent = '';

            const answerCounts = {};
            const baseRuns = 9;
            const totalRuns = Math.pow(9, Math.ceil(Math.log(answers.length) / Math.log(9)));
            const repetitions = answers.length * 9; // Increased repetitions based on answer count

            try {
                for (let i = 0; i < totalRuns; i++) {
                    const answer = await askOracle(answers, repetitions);
                    answerCounts[answer] = (answerCounts[answer] || 0) + 1;
                    
                    // Only log the process for the first 9 runs
                    if (i < 9) {
                        processLog.textContent += `Run ${i + 1}: ${answer}\n`;
                    } else if (i === 9) {
                        processLog.textContent += "...\n";
                    }
                }

                const mostFrequentAnswer = Object.entries(answerCounts).reduce((a, b) => a[1] > b[1] ? a : b)[0];
                const frequency = answerCounts[mostFrequentAnswer];
                const percentage = ((frequency / totalRuns) * 100).toFixed(2);

                document.getElementById('user-question').textContent = `Your question: ${userQuestion}`;
                document.getElementById('result').textContent = `Oracle says (${percentage}% of the time): ${mostFrequentAnswer}`;
                
                // Add summary of results
                processLog.textContent += `\nTotal consultations: ${totalRuns}\n`;
                processLog.textContent += `Magic phrase processed ${repetitions} times per consultation\n`;
                processLog.textContent += `Results summary:\n`;
                for (const [answer, count] of Object.entries(answerCounts)) {
                    const answerPercentage = ((count / totalRuns) * 100).toFixed(2);
                    processLog.textContent += `${answer}: ${answerPercentage}%\n`;
                }
            } catch (error) {
                console.error('Error in askOracleMultipleTimes:', error);
                document.getElementById('error-message').textContent = error.message;
                document.getElementById('error-message').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
            
            questionInput.value = '';
        }
    </script>
</body>
</html>
