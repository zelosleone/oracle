
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #2c3e50;
            --accent-color: #e74c3c;
            --background-color: #ecf0f1;
            --card-background: #ffffff;
            --text-color: #2c3e50;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
        }

        #oracle-container {
            text-align: center;
            padding: 2rem;
            background-color: var(--card-background);
            border-radius: 15px;
            box-shadow: var(--shadow);
            max-width: 800px;
            width: 90%;
            margin: 2rem;
        }

        h1 {
            color: var(--secondary-color);
            margin-bottom: 1.5rem;
            font-size: 2.5rem;
        }

        .ancient-text {
            font-family: 'Times New Roman', Times, serif;
            font-style: italic;
            color: var(--secondary-color);
            background-color: rgba(0, 0, 0, 0.05);
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }

        #answers-input {
            width: 90%;
            padding: 1rem;
            margin: 1rem 0;
            font-size: 1rem;
            border: 2px solid var(--primary-color);
            border-radius: 8px;
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        #canvas-container {
            position: relative;
            margin: 2rem auto;
            max-width: 100%;
            touch-action: none;
        }

        #canvas {
            background-color: white;
            border-radius: 8px;
            box-shadow: var(--shadow);
            touch-action: none;
            width: 100%;
            max-width: 400px;
            height: auto;
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button {
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover {
            background-color: #357abd;
            transform: translateY(-2px);
        }

        button.clear {
            background-color: var(--accent-color);
        }

        #loading {
            color: var(--primary-color);
            font-weight: bold;
        }

        #error-message {
            color: var(--accent-color);
            font-weight: bold;
            padding: 1rem;
            border-radius: 8px;
            background-color: rgba(231, 76, 60, 0.1);
        }

        #process-log {
            text-align: left;
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: #f8f9fa;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            border: 1px solid #dee2e6;
        }

        .summary {
            border-top: 2px solid var(--primary-color);
            margin-top: 1rem;
            padding-top: 1rem;
        }

        #result {
            font-size: 1.5rem;
            margin: 2rem 0;
            padding: 1rem;
            background-color: rgba(74, 144, 226, 0.1);
            border-radius: 8px;
            color: var(--primary-color);
        }

        @media (max-width: 600px) {
            #oracle-container {
                padding: 1rem;
                margin: 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            .controls {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="oracle-container">
        <h1>Revealer of Truth</h1>
        <p id="ancient-message" class="ancient-text">αιη αιωι ηωιαη αη ιω ωη αιηουευωαι εαι υο ιαω ιωη οαυ αεη υωυω χαβραχ φλιεσ κηρφι νυρω φωχω βωχ :7</p>
        <p id="hebrew-message" class="ancient-text">הכפף לי כל הדיימונים, למען ישמעו לי כל דיימון, בין בשמים או ברוח או בארץ או מתחת לארץ או ביבשה או במים, וכל קסם ונגע אשר מאת האלוהים.</p>
        
        <textarea id="answers-input" placeholder="Enter possible answers, one per line"></textarea>
        
        <div id="canvas-container">
            <canvas id="canvas" width="400" height="400"></canvas>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label for="color-picker">Color:</label>
                <input type="color" id="color-picker" value="#000000">
            </div>
            <div class="control-group">
                <label for="brush-size">Size:</label>
                <input type="range" id="brush-size" min="1" max="50" value="5">
            </div>
            <button class="clear" onclick="clearCanvas()">Clear Canvas</button>
            <button onclick="askOracleMultipleTimes()">Show The Truth!</button>
        </div>

        <p id="loading" style="display: none;">Consulting the oracle...</p>
        <p id="error-message" style="display: none;"></p>
        <p id="user-question"></p>
        <p id="result"></p>
        <div id="process-log"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('color-picker');
        const brushSize = document.getElementById('brush-size');
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let isOutside = false;

        function initCanvas() {
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.strokeStyle = colorPicker.value;
            ctx.lineWidth = brushSize.value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        function getCanvasCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            let clientX, clientY;

            if (e.type.includes('touch')) {
                const touch = e.touches[0] || e.changedTouches[0];
                clientX = touch.clientX;
                clientY = touch.clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            return {
                x: Math.min(Math.max(0, (clientX - rect.left) * scaleX), canvas.width),
                y: Math.min(Math.max(0, (clientY - rect.top) * scaleY), canvas.height)
            };
        }

        function startDrawing(e) {
            isDrawing = true;
            isOutside = false;
            const coords = getCanvasCoordinates(e);
            lastX = coords.x;
            lastY = coords.y;
            initCanvas();
        }

        function draw(e) {
            if (!isDrawing) return;

            const coords = getCanvasCoordinates(e);
            
            // Check if we're outside the canvas
            const rect = canvas.getBoundingClientRect();
            const rawX = e.type.includes('touch') ? e.touches[0].clientX : e.clientX;
            const rawY = e.type.includes('touch') ? e.touches[0].clientY : e.clientY;
            
            if (rawX < rect.left || rawX > rect.right || rawY < rect.top || rawY > rect.bottom) {
                isOutside = true;
                return;
            }

            // If we were outside and now coming back in, move to the last position without drawing
            if (isOutside) {
                ctx.beginPath();
                ctx.moveTo(coords.x, coords.y);
                isOutside = false;
            } else {
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(coords.x, coords.y);
                ctx.stroke();
            }

            lastX = coords.x;
            lastY = coords.y;
        }

        function stopDrawing() {
            isDrawing = false;
            isOutside = false;
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // Event listeners for canvas
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            startDrawing(e);
        });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            draw(e);
        });
        canvas.addEventListener('touchend', stopDrawing);
        canvas.addEventListener('touchcancel', stopDrawing);
        window.addEventListener('mouseup', stopDrawing);

        // Random.org API functions
        async function getRandomNumbers(min, max, count) {
            const apiKey = 'b7e2d30e-28a0-4c92-b839-e278a26f1eb6';
            try {
                const response = await fetch(
                    `https://www.random.org/integers/?num=${count}&min=${min}&max=${max}&col=1&base=10&format=plain&rnd=new&apiKey=${apiKey}`
                );

                if (!response.ok) {
                    throw new Error('Failed to get random numbers from Random.org');
                }

                const numbers = await response.text();
                return numbers.trim().split('\n').map(n => parseInt(n, 10));
            } catch (error) {
                throw new Error('Could not obtain true randomness from Random.org. Please try again later.');
            }
        }

        function processMagicPhrase(phrase) {
            return phrase.split('').reverse().join('');
        }

        function isPrime(num) {
            for(let i = 2, s = Math.sqrt(num); i <= s; i++)
                if(num % i === 0) return false; 
            return num > 1;
        }

        function getNextPrime(num) {
            while(!isPrime(num)) {
                num++;
            }
            return num;
        }

        async function askOracleMultipleTimes() {
            const answersInput = document.getElementById('answers-input').value.trim();
            const processLog = document.getElementById('process-log');
            
            if (answersInput === '' || canvas.toDataURL() === document.createElement('canvas').toDataURL()) {
                alert('Please enter both answers and paint your question.');
                return;
            }

            const answers = answersInput.split('\n').filter(line => line.trim() !== '');
            if (answers.length < 2) {
                alert('Please enter at least two possible answers.');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').textContent = '';
            document.getElementById('user-question').textContent = '';
            document.getElementById('error-message').style.display = 'none';
            processLog.innerHTML = '<h3>Oracle Consultation Log</h3>';

            const answerCounts = {};
            const baseRuns = getNextPrime(9 * answers.length);
            const totalRuns = baseRuns;

            try {
                // Get all random numbers at once from Random.org
                const randomNumbers = await getRandomNumbers(0, answers.length - 1, totalRuns);
                
                for (let i = 0; i < totalRuns; i++) {
                    const answer = answers[randomNumbers[i]];
                    answerCounts[answer] = (answerCounts[answer] || 0) + 1;
                    
                    if (i < 9) {
                        processLog.innerHTML += `<p>Run ${i + 1}: ${answer}</p>`;
                    } else if (i === 9) {
                        processLog.innerHTML += "<p>...</p>";
                    }
                }

                // Find most frequent answer
                const mostFrequentAnswer = Object.entries(answerCounts)
                    .reduce((a, b) => a[1] > b[1] ? a : b)[0];
                const frequency = answerCounts[mostFrequentAnswer];
                const percentage = ((frequency / totalRuns) * 100).toFixed(2);

                document.getElementById('user-question').textContent = 'Your painted question has been received.';
                document.getElementById('result').textContent = 
                    `Oracle says (${percentage}% certainty): ${mostFrequentAnswer}`;
                
                // Generate summary
                processLog.innerHTML += `
                    <div class="summary">
                        <p>Total consultations: ${totalRuns}</p>
                        <p>Magic phrase processed ${baseRuns} times</p>
                        <p>Results distribution:</p>
                    </div>
                `;

                // Show distribution of all answers
                for (const [answer, count] of Object.entries(answerCounts)) {
                    const answerPercentage = ((count / totalRuns) * 100).toFixed(2);
                                        processLog.innerHTML += `
                        <p>${answer}: ${count} times (${answerPercentage}%)</p>
                    `;
                }

                // Add visualization of results using ASCII art
                processLog.innerHTML += `<div class="summary">Distribution visualization:</div>`;
                const maxCount = Math.max(...Object.values(answerCounts));
                const barLength = 30; // Maximum bar length in characters

                for (const [answer, count] of Object.entries(answerCounts)) {
                    const normalizedLength = Math.round((count / maxCount) * barLength);
                    const bar = '█'.repeat(normalizedLength);
                    processLog.innerHTML += `<p>${answer}: ${bar} ${count}</p>`;
                }

            } catch (error) {
                console.error('Error during oracle consultation:', error);
                document.getElementById('error-message').textContent = 
                    'The oracle requires true randomness from Random.org to function. ' +
                    'Please try again when the connection to the cosmic forces is restored.';
                document.getElementById('error-message').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        // Initialize canvas settings
        initCanvas();

        // Prevent default touch behavior on canvas
        canvas.addEventListener('touchstart', (e) => e.preventDefault());
        canvas.addEventListener('touchmove', (e) => e.preventDefault());
        canvas.addEventListener('touchend', (e) => e.preventDefault());

        // Handle color picker changes
        colorPicker.addEventListener('change', function() {
            ctx.strokeStyle = this.value;
        });

        // Handle brush size changes
        brushSize.addEventListener('input', function() {
            ctx.lineWidth = this.value;
        });

        // Handle window resize
        window.addEventListener('resize', function() {
            const rect = canvas.getBoundingClientRect();
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.lineWidth = brushSize.value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
            ctx.strokeStyle = colorPicker.value;
        });

        // Prevent scrolling while drawing on mobile
        document.body.addEventListener('touchmove', function(e) {
            if (isDrawing) {
                e.preventDefault();
            }
        }, { passive: false });

        // Add support for high DPI displays
        function setupHighDPI() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            
            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;
            
            ctx.scale(dpr, dpr);
            
            canvas.style.width = `${rect.width}px`;
            canvas.style.height = `${rect.height}px`;
            
            initCanvas();
        }

        // Call setupHighDPI on load and resize
        window.addEventListener('load', setupHighDPI);
        window.addEventListener('resize', setupHighDPI);
    </script>
</body>
</html>
