<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            touch-action: none; /* Prevents default touch behaviors */
        }
        #oracle-container {
            text-align: center;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        #answers-input {
            width: 80%;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 16px;
        }
        #result {
            font-size: 18px;
            margin: 20px 0;
            font-weight: bold;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        #user-question {
            font-weight: bold;
            margin-top: 20px;
        }
        #loading, #error-message {
            display: none;
            margin-top: 10px;
        }
        #error-message {
            color: red;
        }
        #process-log {
            text-align: left;
            margin-top: 20px;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
            border: 1px solid #ddd;
        }
        #process-log h3 {
            margin-top: 0;
            color: #333;
        }
        #process-log p {
            margin: 5px 0;
        }
        #process-log .summary {
            font-weight: bold;
            margin-top: 10px;
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }
        #canvas-container {
            position: relative;
            touch-action: none;
            overflow: hidden;
        }
        #canvas {
            border: 1px solid #000;
            cursor: crosshair;
            touch-action: none;
        }
        #color-picker, #brush-size {
            margin: 10px 0;
        }
    </style>
</head>
<body>
    <div id="oracle-container">
        <h1>Revealer of Truth</h1>
        <textarea id="answers-input" rows="5" placeholder="Enter possible answers, one per line"></textarea>
        <div id="canvas-container">
            <canvas id="canvas" width="400" height="400"></canvas>
        </div>
        <div>
            <input type="color" id="color-picker" value="#000000">
            <input type="range" id="brush-size" min="1" max="50" value="5">
        </div>
        <button onclick="clearCanvas()">Clear Canvas</button>
        <button onclick="askOracleMultipleTimes()">Show The Truth!</button>
        <p id="loading">Consulting the oracle...</p>
        <p id="error-message"></p>
        <p id="user-question"></p>
        <p id="result"></p>
        <div id="process-log"></div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('color-picker');
        const brushSize = document.getElementById('brush-size');
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;
        let leaveTimeout = null;

        // Handle both mouse and touch events
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);

        // Resume drawing if the mouse re-enters the canvas within 1 second
        canvas.addEventListener('mouseenter', () => {
            if (leaveTimeout) {
                clearTimeout(leaveTimeout);
                leaveTimeout = null;
                isDrawing = true;
            }
        });

        // Trigger a 1-second timeout on leaving the canvas
        canvas.addEventListener('mouseleave', () => {
            if (isDrawing) {
                leaveTimeout = setTimeout(() => isDrawing = false, 1000); // 1 second timeout
            }
        });

        // Touch events
        canvas.addEventListener('touchstart', handleTouchStart);
        canvas.addEventListener('touchmove', handleTouchMove);
        canvas.addEventListener('touchend', () => isDrawing = false);

        function getPosition(event) {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            if (event.type.includes('touch')) {
                return {
                    x: (event.touches[0].clientX - rect.left) * scaleX,
                    y: (event.touches[0].clientY - rect.top) * scaleY
                };
            }
            return {
                x: (event.clientX - rect.left) * scaleX,
                y: (event.clientY - rect.top) * scaleY
            };
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getPosition(e);
            [lastX, lastY] = [pos.x, pos.y];
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getPosition(e);
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(pos.x, pos.y);
            ctx.strokeStyle = colorPicker.value;
            ctx.lineWidth = brushSize.value;
            ctx.lineCap = 'round';
            ctx.stroke();
            
            [lastX, lastY] = [pos.x, pos.y];
        }

        function stopDrawing() {
            isDrawing = false;
            if (leaveTimeout) {
                clearTimeout(leaveTimeout);
                leaveTimeout = null;
            }
        }

        function handleTouchStart(e) {
            e.preventDefault();
            startDrawing(e);
        }

        function handleTouchMove(e) {
            e.preventDefault();
            draw(e);
        }

        function clearCanvas() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        async function getRandomNumbers(min, max, count) {
            const apiKey = 'b7e2d30e-28a0-4c92-b839-e278a26f1eb6';
            try {
                const response = await fetch(
                    `https://www.random.org/integers/?num=${count}&min=${min}&max=${max}&col=1&base=10&format=plain&rnd=new&apiKey=${apiKey}`
                );

                if (!response.ok) {
                    throw new Error('Failed to get random numbers from Random.org');
                }

                const numbers = await response.text();
                return numbers.trim().split('\n').map(n => parseInt(n, 10));
            } catch (error) {
                throw new Error('Error connecting to Random.org. Please try again.');
            }
        }

        async function askOracle(answers, repetitions) {
            try {
                const randomNumbers = await getRandomNumbers(0, answers.length - 1, repetitions);
                return randomNumbers.map(num => answers[num]);
            } catch (error) {
                document.getElementById('error-message').textContent = 'Error fetching data from the oracle. ' + error.message;
            }
        }

        async function askOracleMultipleTimes() {
            const answers = document.getElementById('answers-input').value.trim().split('\n').filter(Boolean);
            const repetitions = 10;

            document.getElementById('loading').style.display = 'block';
            document.getElementById('error-message').style.display = 'none';

            if (answers.length === 0) {
                document.getElementById('error-message').textContent = 'Please enter possible answers.';
                return;
            }

            const results = await askOracle(answers, repetitions);

            document.getElementById('loading').style.display = 'none';
            document.getElementById('result').textContent = 'The oracle says: ' + results.join(', ');
        }
    </script>
</body>
</html>
