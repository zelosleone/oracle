<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
        }
        #oracle-container {
            text-align: center;
            padding: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
        }
        #question-input, #answers-input {
            width: 80%;
            padding: 10px;
            margin-bottom: 10px;
            font-size: 16px;
        }
        #result {
            font-size: 18px;
            margin: 20px 0;
            font-weight: bold;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            margin: 5px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #45a049;
        }
        #user-question {
            font-weight: bold;
            margin-top: 20px;
        }
        #loading, #error-message {
            display: none;
            margin-top: 10px;
        }
        #error-message {
            color: red;
        }
        #process-log {
            text-align: left;
            margin-top: 20px;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 5px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            line-height: 1.5;
            border: 1px solid #ddd;
        }
        #process-log h3 {
            margin-top: 0;
            color: #333;
        }
        #process-log p {
            margin: 5px 0;
        }
        #process-log .summary {
            font-weight: bold;
            margin-top: 10px;
            border-top: 1px solid #ddd;
            padding-top: 10px;
        }
    </style>
</head>
<body>
<img id="talisman-image" src="talisman.png" alt="Talisman">
    <div id="oracle-container">
        <h1>Revealer of Truth</h1>
        <p id="ancient-message">αιη αιωι ηωιαη αη ιω ωη αιηουευωαι εαι υο ιαω ιωη οαυ αεη υωυω χαβραχ φλιεσ κηρφι νυρω φωχω βωχ :7</p>
        <p id="hebrew-message">הכפף לי כל הדיימונים, למען ישמעו לי כל דיימון, בין בשמים או ברוח או בארץ או מתחת לארץ או ביבשה או במים, וכל קסם ונגע אשר מאת האלוהים.</p>
        <textarea id="answers-input" rows="5" placeholder="Enter possible answers, one per line"></textarea>
        <input type="text" id="question-input" placeholder="What's your question?">
        <button onclick="askOracleMultipleTimes()">Show The Truth!</button>
        <p id="loading">Consulting the oracle...</p>
        <p id="error-message"></p>
        <p id="user-question"></p>
        <p id="result"></p>
        <div id="process-log"></div>
    </div>

    <script>
        async function getRandomNumber(min, max) {
            const apiKey = 'b7e2d30e-28a0-4c92-b839-e278a26f1eb6';
            try {
                const response = await fetch(`https://www.random.org/integers/?num=1&min=${min}&max=${max}&col=1&base=10&format=plain&rnd=new&apiKey=${apiKey}`);

                if (!response.ok) {
                    throw new Error('Failed to get random number');
                }

                const number = await response.text();
                return parseInt(number.trim(), 10);
            } catch (error) {
                throw new Error('Error connecting to Random.org. Please try again.');
            }
        }

        function processMagicPhrase(phrase) {
            return phrase.split('').reverse().join('');
        }

        function isPrime(num) {
            for(let i = 2, s = Math.sqrt(num); i <= s; i++)
                if(num % i === 0) return false; 
            return num > 1;
        }

        function getNextPrime(num) {
            while(!isPrime(num)) {
                num++;
            }
            return num;
        }

        async function askOracle(answers, repetitions) {
            const ancientMessage = document.getElementById('ancient-message').textContent;
            const hebrewMessage = document.getElementById('hebrew-message').textContent;
            const combinedMessage = ancientMessage + ' ' + hebrewMessage;
            
            let processedMessage = combinedMessage;
            for (let i = 0; i < repetitions; i++) {
                processedMessage = processMagicPhrase(processedMessage);
            }
            console.log(`Processed Magic Phrase ${repetitions} times:`, processedMessage);

            const randomIndex = await getRandomNumber(0, answers.length - 1);
            return answers[randomIndex];
        }

        async function askOracleMultipleTimes() {
            const answersInput = document.getElementById('answers-input').value.trim();
            const questionInput = document.getElementById('question-input');
            const userQuestion = questionInput.value.trim();
            const processLog = document.getElementById('process-log');
            
            if (answersInput === '' || userQuestion === '') {
                alert('Please enter both answers and a question.');
                return;
            }

            const answers = answersInput.split('\n').filter(line => line.trim() !== '');
            if (answers.length < 2) {
                alert('Please enter at least two possible answers.');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').textContent = '';
            document.getElementById('user-question').textContent = '';
            document.getElementById('error-message').style.display = 'none';
            processLog.innerHTML = '<h3>Oracle Consultation Log</h3>';

            const answerCounts = {};
            let baseRuns = 9;
            let repetitions = 9;

            if (answers.length > 2) {
                baseRuns = getNextPrime(9 * answers.length);
                repetitions = baseRuns;
            }

            const totalRuns = baseRuns;

            try {
                for (let i = 0; i < totalRuns; i++) {
                    const answer = await askOracle(answers, repetitions);
                    answerCounts[answer] = (answerCounts[answer] || 0) + 1;
                    
                    if (i < 9) {
                        processLog.innerHTML += `<p>Run ${i + 1}: ${answer}</p>`;
                    } else if (i === 9) {
                        processLog.innerHTML += "<p>...</p>";
                    }
                }

                const mostFrequentAnswer = Object.entries(answerCounts).reduce((a, b) => a[1] > b[1] ? a : b)[0];
                const frequency = answerCounts[mostFrequentAnswer];
                const percentage = ((frequency / totalRuns) * 100).toFixed(2);

                document.getElementById('user-question').textContent = `Your question: ${userQuestion}`;
                document.getElementById('result').textContent = `Oracle says (${percentage}% of the time): ${mostFrequentAnswer}`;
                
                processLog.innerHTML += `
                    <div class="summary">
                        <p>Total consultations: ${totalRuns}</p>
                        <p>Magic phrase processed ${repetitions} times per consultation</p>
                        <p>Results summary:</p>
                    </div>
                `;
                for (const [answer, count] of Object.entries(answerCounts)) {
                    const answerPercentage = ((count / totalRuns) * 100).toFixed(2);
                    processLog.innerHTML += `<p>${answer}: ${answerPercentage}%</p>`;
                }
            } catch (error) {
                console.error('Error in askOracleMultipleTimes:', error);
                document.getElementById('error-message').textContent = error.message;
                document.getElementById('error-message').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
            
            questionInput.value = '';
        }
    </script>
</body>
</html>
