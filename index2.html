<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oracle</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        /* Existing styles remain unchanged, but ensure that canvas has touch-action set to none */
        :root {
            --primary-color: #4a90e2;
            --secondary-color: #2c3e50;
            --accent-color: #e74c3c;
            --background-color: #ecf0f1;
            --card-background: #ffffff;
            --text-color: #2c3e50;
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: var(--background-color);
            color: var(--text-color);
            line-height: 1.6;
            -webkit-user-select: none; /* Prevent selection on mobile */
            -ms-user-select: none;
            user-select: none;
        }

        #oracle-container {
            text-align: center;
            padding: 2rem;
            background-color: var(--card-background);
            border-radius: 15px;
            box-shadow: var(--shadow);
            max-width: 800px;
            width: 90%;
            margin: 2rem;
        }

        h1 {
            color: var(--secondary-color);
            margin-bottom: 1.5rem;
            font-size: 2.5rem;
        }

        .ancient-text {
            font-family: 'Times New Roman', Times, serif;
            font-style: italic;
            color: var(--secondary-color);
            background-color: rgba(0, 0, 0, 0.05);
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }

        #answers-input {
            width: 90%;
            padding: 1rem;
            margin: 1rem 0;
            font-size: 1rem;
            border: 2px solid var(--primary-color);
            border-radius: 8px;
            resize: vertical;
            min-height: 100px;
            font-family: inherit;
        }

        #canvas-container {
            position: relative;
            margin: 2rem auto;
            max-width: 100%;
            touch-action: none;
        }

        #canvas {
            background-color: white;
            border-radius: 8px;
            box-shadow: var(--shadow);
            width: 100%;
            max-width: 400px;
            height: auto;
            touch-action: none; /* Prevent default touch behaviors */
        }

        .controls {
            display: flex;
            gap: 1rem;
            justify-content: center;
            align-items: center;
            margin: 1rem 0;
            flex-wrap: wrap;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button {
            padding: 0.8rem 1.5rem;
            font-size: 1rem;
            cursor: pointer;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            transition: transform 0.2s, background-color 0.2s;
        }

        button:hover {
            background-color: #357abd;
            transform: translateY(-2px);
        }

        button.clear {
            background-color: var(--accent-color);
        }

        #loading {
            color: var(--primary-color);
            font-weight: bold;
        }

        #error-message {
            color: var(--accent-color);
            font-weight: bold;
            padding: 1rem;
            border-radius: 8px;
            background-color: rgba(231, 76, 60, 0.1);
        }

        #process-log {
            text-align: left;
            margin-top: 2rem;
            padding: 1.5rem;
            background-color: #f8f9fa;
            border-radius: 8px;
            max-height: 300px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.9rem;
            line-height: 1.5;
            border: 1px solid #dee2e6;
        }

        .summary {
            border-top: 2px solid var(--primary-color);
            margin-top: 1rem;
            padding-top: 1rem;
        }

        #result {
            font-size: 1.5rem;
            margin: 2rem 0;
            padding: 1rem;
            background-color: rgba(74, 144, 226, 0.1);
            border-radius: 8px;
            color: var(--primary-color);
        }

        @media (max-width: 600px) {
            #oracle-container {
                padding: 1rem;
                margin: 1rem;
            }

            h1 {
                font-size: 2rem;
            }

            .controls {
                flex-direction: column;
            }
        }
    </style>
    <!-- Include math.js library for advanced mathematical computations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.11.0/math.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/numeric/1.2.6/numeric.min.js"></script>
</head>
<body>
    <div id="oracle-container">
        <h1>Revealer of Truth</h1>
        <img src="talisman.png" alt="Talisman" style="width: 100px; height: auto; margin-bottom: 1.5rem;">
        <p id="ancient-message" class="ancient-text">αιη αιωι ηωιαη αη ιω ωη αιηουευωαι εαι υο ιαω ιωη οαυ αεη υωυω χαβραχ φλιεσ κηρφι [...]</p>
        <p id="hebrew-message" class="ancient-text">הכפף לי כל הדיימונים, למען ישמעו לי כל דיימון, בין בשמים או ברוח או בארץ או מתחת לא [...]</p>
        
        <textarea id="answers-input" placeholder="Enter possible answers, one per line"></textarea>
        
        <div id="canvas-container">
            <canvas id="canvas" width="400" height="400"></canvas>
        </div>
        
        <div class="controls">
            <div class="control-group">
                <label for="color-picker">Color:</label>
                <input type="color" id="color-picker" value="#000000">
            </div>
            <div class="control-group">
                <label for="brush-size">Size:</label>
                <input type="range" id="brush-size" min="1" max="50" value="5">
            </div>
            <button class="clear" onclick="clearCanvas()">Clear Canvas</button>
            <button onclick="askOracleMultipleTimes()">Show The Truth!</button>
        </div>

        <p id="loading" style="display: none;">Consulting the oracle...</p>
        <p id="error-message" style="display: none;"></p>
        <p id="user-question"></p>
        <p id="result"></p>
        <div id="process-log"></div>
    </div>

    <script>
// Define the debounce function first
const debounce = (func, delay) => {
    let timer;
    return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => func.apply(this, args), delay);
    };
};

// Then use the debounce function
const debouncedSetupHighDPI = debounce(setupHighDPI, 250);

window.addEventListener('load', setupHighDPI);
window.addEventListener('resize', debouncedSetupHighDPI);
        // Initialize variables and constants
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const colorPicker = document.getElementById('color-picker');
        const brushSize = document.getElementById('brush-size');
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        // Initialize canvas settings
        const initCanvas = () => {
            ctx.setTransform(1, 0, 0, 1, 0, 0);
            ctx.strokeStyle = colorPicker.value;
            ctx.lineWidth = brushSize.value;
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        };

        // Get canvas coordinates
        const getCanvasCoordinates = (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;

            let clientX, clientY;

            if (e.type.includes('touch')) {
                const touch = e.touches[0] || e.changedTouches[0];
                clientX = touch.clientX;
                clientY = touch.clientY;
            } else {
                clientX = e.clientX;
                clientY = e.clientY;
            }

            return {
                x: (clientX - rect.left) * scaleX,
                y: (clientY - rect.top) * scaleY
            };
        };

        // Drawing functions
        const startDrawing = (e) => {
            e.preventDefault();
            isDrawing = true;
            const coords = getCanvasCoordinates(e);
            lastX = coords.x;
            lastY = coords.y;
            initCanvas();
            draw(e); // Start drawing immediately
        };

        const draw = (e) => {
            if (!isDrawing) return;
            e.preventDefault();
            const coords = getCanvasCoordinates(e);

            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(coords.x, coords.y);
            ctx.stroke();

            lastX = coords.x;
            lastY = coords.y;
        };

        const stopDrawing = (e) => {
            if (!isDrawing) return;
            e.preventDefault();
            isDrawing = false;
        };

        const clearCanvas = () => ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Event listeners for canvas
        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseleave', stopDrawing);
        canvas.addEventListener('mouseenter', (e) => {
            if (e.buttons === 1 || e.buttons === 3) {
                isDrawing = true;
                lastX = getCanvasCoordinates(e).x;
                lastY = getCanvasCoordinates(e).y;
            }
        });

        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDrawing, { passive: false });
        canvas.addEventListener('touchcancel', stopDrawing, { passive: false });

        window.addEventListener('mouseup', stopDrawing);
        window.addEventListener('touchend', stopDrawing);
        window.addEventListener('touchcancel', stopDrawing);

        // Prevent default touch actions on canvas to avoid opening keyboard
        canvas.addEventListener('focus', (e) => {
            e.preventDefault();
        });

        // Random.org API interaction
        const getRandomNumbers = async (min, max, count) => {
            if (min >= max) {
                throw new Error("Parameter 'min' must be less than parameter 'max'");
            }

            try {
                const response = await fetch('https://api.random.org/json-rpc/4/invoke', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        "jsonrpc": "2.0",
                        "method": "generateIntegers",
                        "params": {
                            "apiKey": "b7e2d30e-28a0-4c92-b839-e278a26f1eb6",
                            "n": count,
                            "min": min,
                            "max": max,
                            "replacement": true
                        },
                        "id": 1
                    })
                });

                if (!response.ok) {
                    throw new Error('Failed to get random numbers from Random.org');
                }

                const data = await response.json();

                if (data.error) {
                    throw new Error(data.error.message);
                }

                return data.result.random.data;
            } catch (error) {
                console.error('Random.org API Error:', error);
                throw new Error('Could not obtain true randomness from Random.org. Please try again later.');
            }
        };

        // Advanced mathematical computations using math.js
const calculatePentagramEnergy = async () => {
    const sides = await getRandomNumbers(1, 100, 5);

    // Represent points using complex numbers
    const points = sides.map((side, index) => {
        const angle = ((2 * Math.PI) / 5) * index;
        return math.complex(side * Math.cos(angle), side * Math.sin(angle));
    });

    // Perform complex calculations with logarithms
    let energySum = 0;
    for (let i = 0; i < points.length; i++) {
        const nextPoint = points[(i + 2) % points.length];
        const distance = math.abs(math.subtract(points[i], nextPoint));
        const logDistance = Math.log(distance + 1);
        energySum += logDistance;
    }

    // Define the integrand function
    const integrand = (x) => Math.pow(x, 2) + energySum;

    const lowerLimit = 0;
    const upperLimit = 5;

    // Use numeric.js for numerical integration
    const integralValue = numeric.integration(integrand, lowerLimit, upperLimit);

    // Normalize energy
    const pentagramEnergy = (integralValue % 1);

    return pentagramEnergy;
};
        // Shuffle answers using Random.org
        const shuffleAnswers = async (answers) => {
            try {
                if (!Array.isArray(answers) || answers.length < 2) {
                    return answers;
                }

                const indices = await getRandomNumbers(0, answers.length - 1, answers.length);
                const shuffledAnswers = [...answers];

                // Fisher-Yates shuffle using the random indices
                for (let i = shuffledAnswers.length - 1; i > 0; i--) {
                    const j = indices[i] % (i + 1);
                    [shuffledAnswers[i], shuffledAnswers[j]] = [shuffledAnswers[j], shuffledAnswers[i]];
                }

                return shuffledAnswers;
            } catch (error) {
                console.error('Error shuffling answers:', error);
                // Return the original array if shuffling fails
                return answers;
            }
        };

        const askOracleMultipleTimes = async () => {
            const answersInput = document.getElementById('answers-input').value.trim();
            const processLog = document.getElementById('process-log');

            // Check for empty canvas
            const blankCanvas = document.createElement('canvas');
            blankCanvas.width = canvas.width;
            blankCanvas.height = canvas.height;
            const blankCanvasData = blankCanvas.toDataURL();
            const userCanvasData = canvas.toDataURL();

            if (answersInput === '' || userCanvasData === blankCanvasData) {
                alert('Please enter both answers and paint your question.');
                return;
            }

            const answers = answersInput.split('\n').filter(line => line.trim() !== '');
            if (answers.length < 2) {
                alert('Please enter at least two possible answers.');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('result').textContent = '';
            document.getElementById('user-question').textContent = '';
            document.getElementById('error-message').style.display = 'none';
            processLog.innerHTML = '<h3>Oracle Consultation Log</h3>';

            try {
                processLog.innerHTML += '<p>Randomizing answer positions...</p>';
                const shuffledAnswers = await shuffleAnswers(answers);
                processLog.innerHTML += '<p>Answers randomized.</p>';

                processLog.innerHTML += '<p>Calculating pentagram energies...</p>';
                const pentagramEnergy = await calculatePentagramEnergy();
                processLog.innerHTML += `<p>Pentagram energy level: ${(pentagramEnergy * 100).toFixed(2)}%</p>`;

                const answerCounts = {};
                const baseRuns = shuffledAnswers.length === 2 ? 9 : getNextPrime(9 * shuffledAnswers.length);
                const totalRuns = Math.max(baseRuns, Math.floor(baseRuns * pentagramEnergy));

                for (let i = 0; i < totalRuns; i++) {
                    const randomNumber = await getRandomNumbers(0, shuffledAnswers.length - 1, 1);
                    const energyInfluencedIndex = Math.floor(randomNumber[0] * pentagramEnergy) % shuffledAnswers.length;
                    const answer = shuffledAnswers[energyInfluencedIndex];
                    answerCounts[answer] = (answerCounts[answer] || 0) + 1;

                    if (i < 9) {
                        processLog.innerHTML += `<p>Run ${i + 1}: ${answer}</p>`;
                    } else if (i === 9) {
                        processLog.innerHTML += "<p>...</p>";
                    }
                }

                const mostFrequentAnswer = Object.entries(answerCounts)
                    .reduce((a, b) => a[1] > b[1] ? a : b)[0];
                const frequency = answerCounts[mostFrequentAnswer];
                const percentage = ((frequency / totalRuns) * 100).toFixed(2);

                document.getElementById('user-question').textContent = 'Your painted question has been received.';
                document.getElementById('result').textContent = 
                    `Oracle says (${percentage}% certainty): ${mostFrequentAnswer}`;

                processLog.innerHTML += `
                    <div class="summary">
                        <p>Total consultations: ${totalRuns}</p>
                        <p>Pentagram influence: ${(pentagramEnergy * 100).toFixed(2)}%</p>
                        <p>Results distribution:</p>
                    </div>
                `;

                for (const [answer, count] of Object.entries(answerCounts)) {
                    const answerPercentage = ((count / totalRuns) * 100).toFixed(2);
                    processLog.innerHTML += `
                        <p>${answer}: ${count} times (${answerPercentage}%)</p>
                    `;
                }

            } catch (error) {
                console.error('Error during oracle consultation:', error);
                document.getElementById('error-message').textContent = 
                    'The oracle requires true randomness from Random.org to function. ' +
                    'Please try again when the connection to the cosmic forces is restored.';
                document.getElementById('error-message').style.display = 'block';
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        };

        // Additional helper functions
        const isPrime = (num) => {
            for(let i = 2, s = Math.sqrt(num); i <= s; i++) {
                if(num % i === 0) return false;
            }
            return num > 1;
        };

        const getNextPrime = (num) => {
            while(!isPrime(++num)) {}
            return num;
        };

        // Initialize canvas and event listeners
        initCanvas();

        // Prevent default touch behavior on canvas to avoid opening keyboard
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
        }, { passive: false });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
        }, { passive: false });
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
        }, { passive: false });

        // Handle color picker changes
        colorPicker.addEventListener('change', function() {
            ctx.strokeStyle = this.value;
        });

        // Handle brush size changes
        brushSize.addEventListener('input', function() {
            ctx.lineWidth = this.value;
        });

        // High DPI setup
        const setupHighDPI = () => {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();

            canvas.width = rect.width * dpr;
            canvas.height = rect.height * dpr;

            ctx.scale(dpr, dpr);

            canvas.style.width = `${rect.width}px`;
            canvas.style.height = `${rect.height}px`;

            initCanvas();
        };

        // Prevent scrolling while drawing on mobile
        document.body.addEventListener('touchmove', (e) => {
            if (isDrawing) {
                e.preventDefault();
            }
        }, { passive: false });
    </script>
</body>
</html>
